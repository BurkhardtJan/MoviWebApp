<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">
</head>
<body>
<header>
    <div>
        <a href="{{ url_for('index') }}" class="logo">🎬MoviWebApp</span></a>
    </div>
</header>
<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>
<main class="container">
    {% block content %}{% endblock %}
</main>
<footer class="main-footer">
    <div class="container">
        <p>&copy; 2026 MoviWebApp </p>
    </div>
</footer>
</body>
</html>
