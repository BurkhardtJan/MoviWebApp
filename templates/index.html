{% extends "base.html" %}
{% block content %}
<h1>Users</h1>
<ul class="user-list">
    {% for user in users %}
    <li class="user-entry">
        <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn">{{ user.name }}</a>
    </li>
    {% endfor %}
</ul>
<div class="add_new_user">
    <h3>Add New User</h3>
<form action="{{ url_for('create_user') }}" method="post">
    <input type="text" name="new_user" placeholder="User name">
    <button type="submit">Create User</button>
</form>
</div>
{% endblock %}
